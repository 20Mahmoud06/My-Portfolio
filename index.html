<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/My-Portfolio/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Mahmoud Safa — Flutter Developer Portfolio">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mahmoud Safa">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Mahmoud Safa — Flutter Developer</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Force HTML renderer for native browser zoom (pinch, Ctrl+scroll) support
    (async () => {
      const resp = await fetch('flutter_bootstrap.js');
      let code = await resp.text();
      code = code.replace('"renderer":"canvaskit"', '"renderer":"html"');
      const blob = new Blob([code], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      document.body.appendChild(Object.assign(document.createElement('script'), { src: url }));
    })();
  </script>
</body>
</html>
